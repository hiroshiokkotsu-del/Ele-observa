<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Arquivo</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: monospace;
      color: white;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .olhos {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px; /* VOCÊ PODE MUDAR O TAMANHO */
      opacity: 0;
      transition: opacity 0.3s;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      pointer-events: none;
    }

    .mensagem {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- COLOQUE SUA IMAGEM DOS OLHOS AQUI -->
  <img src="443cd6598fb3e8e2c293d107909e548f.jpg" class="olhos" id="olhos">

  <div class="overlay"></div>

  <div class="mensagem">Ele observa.</div>

</div>

<script>
  const olhos = document.getElementById("olhos");

  function aparecerOlhos() {
    olhos.style.opacity = 1;

    setTimeout(() => {
      olhos.style.opacity = 0;
    }, 1200);
  }

  // aparece aleatoriamente
  setInterval(() => {
    if (Math.random() > 0.6) {
      aparecerOlhos();
    }
  }, 3000);

  // aparece quando o mouse para (efeito creepy)
  let timeout;
  document.addEventListener("mousemove", () => {
    clearTimeout(timeout);

    olhos.style.opacity = 0;

    timeout = setTimeout(() => {
      aparecerOlhos();
    }, 2000);
  });
</script>

</body>
</html>
